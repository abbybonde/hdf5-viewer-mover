name: Build & Release Windows EXE

on:
  push:
    tags:
      - "v*"           # trigger on any tag like v1.0.0, v0.3.1, etc.
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write      # needed to create a GitHub Release and upload assets

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build single-file executable with PyInstaller
        run: python pyinstaller.py

      # PyInstaller --onefile produces dist\main.exe
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HDF5Viewer-Windows
          path: dist\main.exe

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist\main.exe
