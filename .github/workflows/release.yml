name: Build & Release Windows Installer

on:
  push:
    tags:
      - "v*"           # trigger on any tag like v1.0.0, v0.3.1, etc.
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write      # needed to create a GitHub Release and upload assets

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: python pyinstaller.py

      # Inno Setup is pre-installed on GitHub-hosted Windows runners
      - name: Build Windows installer with Inno Setup
        run: iscc windows\compile.iss

      # The installer ends up at dist\HDF5Viewer_Windows_Installer.exe
      # PyInstaller also produces dist\main\main.exe (standalone exe inside folder)
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist\HDF5Viewer_Windows_Installer.exe

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist\HDF5Viewer_Windows_Installer.exe
